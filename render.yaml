services:
  - type: web
    name: pdf-to-markdown
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt && cd frontend && npm ci && npm run build && cd .. && mkdir -p backend/static && cp -r frontend/dist/. backend/static/
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
